<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Experiment 1 - Grade Calculator</title>
  <link rel="stylesheet" href="exp1.css" />
</head>
<body>

  <h1>Student Grade Calculator</h1>

  <div id="inputSection">
    <label>Enter number of subjects:</label>
    <input type="number" id="numSubjects" min="1" />
    <button onclick="generateFields()">Next</button>

    <div id="marksFields"></div>
    <button id="calcBtn" style="display:none" onclick="calculate()">Calculate</button>
  </div>

  <div id="result"></div>

  <script src="exp1.js"></script>
</body>
</html>
